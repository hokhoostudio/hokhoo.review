<!DOCTYPE html>
<html lang="th"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOKHOO Studio - พิกัดของดีบอกต่อ (Recommended Items)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&amp;family=Prompt:wght@300;400;500;700;900&amp;display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. ตั้งค่าพื้นฐาน (ป้องกันการซูมและล็อกสีพื้นหลัง)
           ========================================= */
        html, body {
            margin: 0; padding: 0; width: 100%;
            background-color: #000000;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        :root {
            --color-black: #000000;
            --color-dark-gray: #1a1a1a;
            --color-mid-gray: #737373;
            --color-light-gray: #BDBDBD;
            --color-white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', 'Noto Sans Thai', sans-serif; }

        /* =========================================
           2. ระบบสลับร่างอัตโนมัติ (Responsive Switcher)
           ========================================= */
        .desktop-only-view {
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
            min-height: 100vh; width: 100%; padding: 0 20px 40px 20px; color: var(--color-white);
        }
        .mobile-only-view {
            display: none !important;
        }

        @media (max-width: 768px) {
            .desktop-only-view {
                display: none !important;
            }
            .mobile-only-view {
                display: block !important;
                width: 100%; padding: 0 0 40px 0; color: var(--color-white);
            }
        }

        /* =========================================
           3. STYLE FOR DESKTOP (คอมพิวเตอร์)
           ========================================= */
        .desktop-only-view .admin-btn { position: absolute; top: 20px; right: 20px; background-color: transparent; color: var(--color-mid-gray); border: 1px solid var(--color-mid-gray); padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; z-index: 100; transition: all 0.3s; }
        .desktop-only-view .admin-btn:hover { background-color: var(--color-white); color: var(--color-black); border-color: var(--color-white); }
        .desktop-only-view .admin-btn .en-btn-text { font-size: 0.65rem; display: block; margin-top: 2px; }

        .desktop-only-view header { position: relative; width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; margin-top: 40px; margin-bottom: 60px; padding: 60px 0; }
        .desktop-only-view .hero-text { font-size: clamp(4rem, 18vw, 14rem); font-weight: 900; text-transform: uppercase; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); z-index: 0; white-space: nowrap; pointer-events: none; color: transparent; -webkit-text-stroke: 2px rgba(115, 115, 115, 0.4); animation: textIntro 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .desktop-only-view .hero-text::before { content: "HOKHOO"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(120deg, transparent 0%, transparent 40%, var(--color-white) 50%, transparent 60%, transparent 100%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5)); animation: shine 4s linear infinite; }
        .desktop-only-view .hero-text::after { content: "HOKHOO"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; color: transparent; -webkit-text-stroke: 1px var(--color-light-gray); z-index: -1; animation: pulseWave 3s ease-out infinite; }
        
        @keyframes textIntro { 0% { letter-spacing: -40px; opacity: 0; transform: translate(-50%, -40%) scale(0.8); } 100% { letter-spacing: 5px; opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        @keyframes shine { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
        @keyframes pulseWave { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.15); opacity: 0; letter-spacing: 15px; } }
        @keyframes floatOwl { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .desktop-only-view .logo-container { position: relative; z-index: 2; display: inline-block; margin-bottom: 25px; animation: floatOwl 4s ease-in-out infinite; text-decoration: none; outline: none; }
        .desktop-only-view .logo-img { max-width: 320px; height: auto; filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.8)); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .desktop-only-view .logo-img:hover { transform: scale(1.08) rotate(-5deg); }

        .desktop-only-view .header-title { text-align: center; z-index: 2; margin-bottom: 30px; }
        .desktop-only-view .header-title h1 { font-size: 1.8rem; font-weight: 700; color: var(--color-white); }
        .desktop-only-view .header-title .en-sub { font-size: 1rem; color: var(--color-light-gray); font-weight: 300; }

        .desktop-only-view .search-container { display: flex; gap: 12px; width: 100%; max-width: 600px; position: relative; z-index: 2; }
        .desktop-only-view .search-input { flex: 1; padding: 16px 25px; background-color: rgba(26, 26, 26, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); color: var(--color-white); font-size: 1rem; border-radius: 40px; outline: none; transition: all 0.3s; }
        .desktop-only-view .search-input:focus { border-color: var(--color-white); background-color: rgba(26, 26, 26, 1); }

        .desktop-only-view .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; max-width: 1000px; width: 100%; }
        .desktop-only-view .product-card { background-color: var(--color-black); border: 1px solid #333; border-radius: 20px; overflow: hidden; padding: 15px; display: flex; flex-direction: column; transition: all 0.4s ease; }
        .desktop-only-view .product-card:hover { transform: translateY(-10px); border-color: var(--color-white); box-shadow: 0 15px 30px rgba(255, 255, 255, 0.08); }
        
        .desktop-only-view .product-link { display: block; border-radius: 12px; overflow: hidden; position: relative; }
        .desktop-only-view .product-link:hover .product-image { transform: scale(1.08); }
        .desktop-only-view .product-image { width: 100%; aspect-ratio: 4/5; object-fit: cover; background-color: var(--color-dark-gray); transition: transform 0.5s ease; display: block; }
        
        .desktop-only-view .badge-id { position: absolute; top: 10px; left: 10px; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(5px); color: var(--color-white); padding: 5px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; border: 1px solid rgba(255,255,255,0.3); z-index: 2; }
        .desktop-only-view .product-info { padding: 15px 5px 5px 5px; display: flex; flex-direction: column; flex-grow: 1; }
        .desktop-only-view .product-tags { font-size: 0.8rem; color: var(--color-mid-gray); margin-bottom: 8px; font-weight: 300; }
        .desktop-only-view .product-title { font-size: 1.15rem; font-weight: 500; color: var(--color-white); margin-bottom: 20px; line-height: 1.4; }
        .desktop-only-view .en-text { display: block; font-size: 0.85rem; font-weight: 300; color: var(--color-light-gray); margin-top: 4px; line-height: 1.2; }

        .desktop-only-view .view-btn { margin-top: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; background-color: var(--color-white); color: var(--color-black); padding: 10px; border-radius: 12px; text-decoration: none; font-size: 0.95rem; font-weight: 700; transition: all 0.3s; box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1); line-height: 1.3; }
        .desktop-only-view .view-btn:hover { background-color: #e0e0e0; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2); }
        .desktop-only-view .view-btn .en-btn-sub { font-size: 0.75rem; color: #555; font-weight: 400; margin-top: 2px; }

        /* ระบบแอดมิน Desktop */
        .desktop-only-view .admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .desktop-only-view .admin-panel { background-color: var(--color-dark-gray); width: 100%; max-width: 600px; padding: 30px; border-radius: 20px; border: 1px solid #444; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .desktop-only-view .admin-panel h2 { margin-bottom: 5px; font-size: 1.4rem; color: white; }
        .desktop-only-view .admin-note { font-size: 0.8rem; color: var(--color-light-gray); margin-bottom: 20px; border-bottom: 1px solid #444; padding-bottom: 15px; }
        .desktop-only-view .form-group { margin-bottom: 15px; }
        .desktop-only-view .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--color-light-gray); }
        .desktop-only-view .form-group input { width: 100%; padding: 10px; background: #111; border: 1px solid #444; color: white; border-radius: 8px; outline: none; }
        .desktop-only-view .form-group input:focus { border-color: var(--color-white); }
        .desktop-only-view .btn-save { background: white; color: black; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 1rem; transition: background 0.3s; }
        .desktop-only-view .btn-save:hover { background: #ddd; }
        .desktop-only-view .btn-save:disabled { background: #666; cursor: not-allowed; }
        .desktop-only-view .btn-cancel { background: transparent; color: #ff6b6b; border: 1px solid #ff6b6b; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; display: none; }
        .desktop-only-view .btn-clear { background: transparent; color: #ff4444; border: 1px dashed #ff4444; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; font-size: 1rem; }
        .desktop-only-view .btn-clear:hover { background: rgba(255, 68, 68, 0.1); }
        .desktop-only-view .btn-download { background: #28a745; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 25px; font-size: 1rem; border: 1px dashed white; }
        .desktop-only-view .btn-download:hover { background: #218838; }
        .desktop-only-view .close-admin { float: right; cursor: pointer; font-size: 1.5rem; color: gray; }
        .desktop-only-view .admin-item-list { margin-top: 30px; border-top: 1px dashed #444; padding-top: 20px; }
        .desktop-only-view .admin-item { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; font-size: 0.9rem;}
        .desktop-only-view .admin-actions { display: flex; gap: 8px; }
        .desktop-only-view .btn-edit { background: #4dabf7; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .desktop-only-view .btn-del { background: #ff4444; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }

        /* =========================================
           4. STYLE FOR MOBILE (แอปมือถือ)
           ========================================= */
        .mobile-only-view .mobile-app-container { width: 100%; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; }
        .mobile-only-view header { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: 10px; margin-bottom: 25px; }
        .mobile-only-view .hero-text { font-size: 25vw; font-weight: 900; text-transform: uppercase; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 0; white-space: nowrap; pointer-events: none; color: transparent; -webkit-text-stroke: 1px rgba(115, 115, 115, 0.3); animation: floatTextMobile 6s ease-in-out infinite; }
        
        @keyframes floatTextMobile { 0%, 100% { transform: translate(-50%, -50%); } 50% { transform: translate(-50%, -52%); } }
        @keyframes floatOwlMobile { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .mobile-only-view .logo-container { position: relative; z-index: 2; margin-bottom: 15px; animation: floatOwlMobile 4s ease-in-out infinite; text-decoration: none; outline: none; }
        .mobile-only-view .logo-img { max-width: 150px; height: auto; filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.8)); }
        .mobile-only-view .header-title { text-align: center; z-index: 2; margin-bottom: 20px; }
        .mobile-only-view .header-title h1 { font-size: 1.3rem; font-weight: 700; color: var(--color-white); }
        .mobile-only-view .header-title .en-sub { font-size: 0.8rem; color: var(--color-light-gray); font-weight: 300; margin-top: 2px;}
        
        .mobile-only-view .search-container { width: 100%; position: relative; z-index: 2; padding: 0 5px; }
        .mobile-only-view .search-input { width: 100%; padding: 12px 20px; background-color: rgba(26, 26, 26, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.15); color: var(--color-white); font-size: 0.85rem; border-radius: 30px; outline: none; transition: all 0.3s; }
        .mobile-only-view .search-input:focus { border-color: rgba(255,255,255,0.5); }

        .mobile-only-view .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; padding: 0 5px; }
        .mobile-only-view .product-card { background-color: var(--color-black); border: 1px solid #222; border-radius: 12px; overflow: hidden; padding: 6px; display: flex; flex-direction: column; }
        .mobile-only-view .product-link { display: block; border-radius: 8px; overflow: hidden; position: relative; }
        .mobile-only-view .product-image { width: 100%; aspect-ratio: 4/5; object-fit: cover; background-color: var(--color-dark-gray); display: block; }
        .mobile-only-view .badge-id { position: absolute; top: 5px; left: 5px; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(5px); color: var(--color-white); padding: 3px 6px; border-radius: 6px; font-size: 0.55rem; font-weight: 600; border: 1px solid rgba(255,255,255,0.2); z-index: 2; }
        .mobile-only-view .product-info { padding: 8px 2px 2px 2px; display: flex; flex-direction: column; flex-grow: 1; }
        .mobile-only-view .product-tags { font-size: 0.55rem; color: var(--color-mid-gray); margin-bottom: 4px; font-weight: 300; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mobile-only-view .product-title { font-size: 0.75rem; font-weight: 500; color: var(--color-white); margin-bottom: 8px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
        .mobile-only-view .en-text { display: block; font-size: 0.65rem; font-weight: 300; color: var(--color-light-gray); margin-top: 1px; }
        
        .mobile-only-view .view-btn { margin-top: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; background-color: var(--color-white); color: var(--color-black); padding: 6px 2px; border-radius: 8px; text-decoration: none; font-size: 0.7rem; font-weight: 700; line-height: 1.2; }
        .mobile-only-view .view-btn.disabled { background-color: var(--color-dark-gray); color: var(--color-mid-gray); pointer-events: none; }
        .mobile-only-view .view-btn .en-btn-sub { font-size: 0.55rem; color: #555; font-weight: 400; margin-top: 1px;}
    </style>
</head>

        <header>

            <div class="search-container">

            </div>
        </header>

        <main id="productGrid" class="product-grid"></main>

        <div id="adminModal" class="admin-modal">
            <div class="admin-panel">
                <span class="close-admin" onclick="closeAdmin()">×</span>
                <h2>🛠️ จัดการพิกัดสินค้า</h2>
                <div class="admin-note">
                    กรอกเฉพาะภาษาไทย ระบบจะช่วยแปลภาษาอังกฤษให้อัตโนมัติในตอนกดบันทึก<br>
                    *หากต้องการล้างข้อมูลเก่าที่ค้างอยู่ ให้กดปุ่ม "ล้างข้อมูลทั้งหมด" ด้านล่างสุดครับ
                </div>
                
                <form id="addProductForm">
                    <input type="hidden" id="edit_index" value="-1">
                    <div class="form-group">
                        <label>รหัสอ้างอิงพิกัด / ID (เช่น HK01)</label>
                        <input type="text" id="a_id" required="">
                    </div>
                    <div class="form-group">
                        <label>ชื่อสินค้า / Name (กรอกแค่ภาษาไทย)</label>
                        <input type="text" id="a_name" required="" placeholder="เช่น โคมไฟตั้งโต๊ะสุดมินิมอล">
                    </div>
                    <div class="form-group">
                        <label>ลิ้งค์รูปภาพหน้าปก / Image (URL)</label>
                        <input type="url" id="a_image" required="" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>ลิ้งค์พิกัดสินค้า / Link (Shopee / Lazada / Tiktok)</label>
                        <input type="url" id="a_link" required="" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>แฮชแท็ก / Tags (คั่นด้วยช่องว่าง เช่น #แต่งห้อง #มินิมอล)</label>
                        <input type="text" id="a_tags" placeholder="#แต่งโต๊ะทำงาน #ของมันต้องมี">
                    </div>
                    <button type="submit" id="submitBtn" class="btn-save" style="background-color: white; color: black;">+ เพิ่มพิกัดใหม่</button>
                    <button type="button" id="cancelEditBtn" class="btn-cancel" onclick="cancelEdit()" style="display: none;">ยกเลิกการแก้ไข</button>
                </form>

                <div class="admin-item-list" id="adminItemList"></div>
                
                <button class="btn-clear" onclick="clearAllData()">🗑️ ล้างข้อมูลทั้งหมด (Clear All Data)</button>
                
                <button class="btn-download" onclick="downloadCleanHTML()">📥 ดาวน์โหลดไฟล์ HTML (อัปเดตล่าสุด นำไปใช้อัปขึ้น Github)</button>
            </div>
        </div>
    </div>

            <main id="productGridMobile" class="product-grid"></main>

    </div>

        let products = JSON.parse(localStorage.getItem('hokhooCreatorData')) || initialData;

        // 🟢 ฟังก์ชันแปลภาษาอังกฤษอัตโนมัติ (ผ่าน API ของ Google)
        async function fetchAutoTranslation(thaiText) {
            if(!thaiText) return "HOKHOO Selected Item";
            try {
                // เรียกใช้ Google Translate API แบบไม่ต้องใช้ Key (สำหรับโปรเจกต์ขนาดเล็ก)
                const response = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=th&tl=en&dt=t&q=${encodeURIComponent(thaiText)}`);
                const result = await response.json();
                return result[0][0][0]; // คืนค่าคำแปล
            } catch (error) {
                console.error("Translation Error:", error);
                return "HOKHOO Selected Item"; // ถ้าเน็ตหลุดหรือมีปัญหา ให้ใช้ค่าเริ่มต้น
            }
        }

        // ฟังก์ชันบันทึกและอัปเดตตารางพร้อมกัน
        function saveData() {
            localStorage.setItem('hokhooCreatorData', JSON.stringify(products));
            renderProducts(products);          
            renderProductsMobile(products);    
            renderAdminList();                 
        }

        // 🟢 ฟังก์ชันล้างข้อมูลทั้งหมด 
        function clearAllData() {
            if(confirm("⚠️ คำเตือน: คุณแน่ใจหรือไม่ว่าจะ 'ลบสินค้าทั้งหมด' ออกจากระบบ?\n(การกระทำนี้จะล้างหน้าเว็บให้กลับไปว่างเปล่า 100%)")) {
                products = [];
                saveData();
                alert("ล้างข้อมูลเรียบร้อยแล้ว! ตอนนี้หน้าเว็บว่างเปล่าพร้อมใช้งานครับ");
            }
        }


        /* -----------------------------------------
           JAVASCRIPT FOR DESKTOP 
           ----------------------------------------- */
        function renderProducts(dataToRender) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = ""; 

            // หากไม่มีข้อมูลให้โชว์หน้าว่าง
            if(dataToRender.length === 0) {
                grid.innerHTML = `
                <div style='grid-column: span 3; text-align:center; width:100%; color:#777; padding: 40px 0;'>
                    <p style='margin-bottom: 5px;'>ยังไม่มีสินค้าในระบบ</p>
                    <span class='en-text' style='font-size: 0.8rem;'>No items available</span>
                </div>`;
                return;
            }

            dataToRender.forEach(p => {
                const enTextDisplay = p.name_en ? p.name_en : "HOKHOO Selected Item";
                const isDisabled = p.link.includes("javascript:void(0)") ? "disabled" : "";
                
                const card = `
                <div class="product-card">
                    <a href="${p.link}" class="product-link" ${isDisabled ? "" : 'target="_blank"'}>
                        <div class="badge-id">${p.id}</div> 
                        <img src="${p.image}" alt="${p.name}" class="product-image" loading="lazy">
                    </a>
                    <div class="product-info">
                        <div class="product-tags">${p.tags}</div> 
                        <h3 class="product-title">
                            ${p.name}
                            <span class="en-text">${enTextDisplay}</span>
                        </h3>
                        <!-- 🟢 แก้ไขปุ่มตรงนี้ -->
                        <a href="${p.link}" ${isDisabled ? "" : 'target="_blank"'} class="view-btn ${isDisabled}">
                            📍 ดูพิกัด คลิ๊ก!
                            <span class="en-btn-sub">Click to View!</span>
                        </a>
                    </div>
                </div>`;
                grid.innerHTML += card;
            });
        }

        function filterProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = products.filter(p => 
                p.id.toLowerCase().includes(query) || 
                p.tags.toLowerCase().includes(query) ||
                p.name.toLowerCase().includes(query) ||
                (p.name_en && p.name_en.toLowerCase().includes(query))
            );
            renderProducts(filtered);
        }

        function editProduct(index) {
            const p = products[index];
            document.getElementById('edit_index').value = index;
            document.getElementById('a_id').value = p.id;
            document.getElementById('a_name').value = p.name;
            document.getElementById('a_image').value = p.image;
            document.getElementById('a_link').value = p.link;
            document.getElementById('a_tags').value = p.tags;
            
            document.getElementById('submitBtn').innerText = "💾 บันทึกการแก้ไข";
            document.getElementById('submitBtn').style.backgroundColor = "#4dabf7";
            document.getElementById('submitBtn').style.color = "white";
            document.getElementById('cancelEditBtn').style.display = "block";
        }

        function cancelEdit() {
            document.getElementById('addProductForm').reset();
            document.getElementById('edit_index').value = "-1";
            document.getElementById('submitBtn').innerText = "+ เพิ่มพิกัดใหม่";
            document.getElementById('submitBtn').style.backgroundColor = "white";
            document.getElementById('submitBtn').style.color = "black";
            document.getElementById('cancelEditBtn').style.display = "none";
        }

        // 🟢 อัปเดตการทำงานเมื่อกดปุ่มบันทึก/เพิ่ม เพื่อดึงคำแปลมาใส่ก่อนบันทึก
        document.getElementById('addProductForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const editIndex = parseInt(document.getElementById('edit_index').value);
            let thaiName = document.getElementById('a_name').value;

            // ทำให้ปุ่มกดซ้ำไม่ได้ และโชว์ข้อความว่ากำลังแปลภาษา
            submitBtn.innerText = "⏳ กำลังแปลภาษาและบันทึก...";
            submitBtn.disabled = true;

            // เรียกฟังก์ชันแปลภาษาอัตโนมัติ
            let englishName = await fetchAutoTranslation(thaiName);

            const newData = {
                id: document.getElementById('a_id').value.toUpperCase(),
                name: thaiName,
                name_en: englishName,
                image: document.getElementById('a_image').value,
                link: document.getElementById('a_link').value,
                tags: document.getElementById('a_tags').value
            };

            if (editIndex > -1) {
                products[editIndex] = newData;
                cancelEdit();
            } else {
                products.unshift(newData);
                this.reset();
            }
            saveData(); 
            
            // คืนค่าปุ่มให้กลับมาเหมือนเดิม
            submitBtn.disabled = false;
            if(editIndex === -1){
                submitBtn.innerText = "+ เพิ่มพิกัดใหม่";
            } else {
                cancelEdit();
            }
        });

        function deleteProduct(index) {
            if(confirm("ลบพิกัดสินค้านี้?")) {
                products.splice(index, 1);
                saveData(); 
                cancelEdit(); 
            }
        }

        function downloadCleanHTML() {
            cancelEdit();
            let docClone = document.documentElement.cloneNode(true);
            
            let adminBox = docClone.querySelector("#adminModal");
            if(adminBox) { adminBox.removeAttribute("style"); }

            let searchInputDesktop = docClone.querySelector("#searchInput");
            if(searchInputDesktop) { searchInputDesktop.value = ""; }

            let searchInputMobile = docClone.querySelector("#searchInputMobile");
            if(searchInputMobile) { searchInputMobile.value = ""; }

            let pGrid = docClone.querySelector("#productGrid");
            if(pGrid) { pGrid.innerHTML = ""; }

            let mGrid = docClone.querySelector("#productGridMobile");
            if(mGrid) { mGrid.innerHTML = ""; }
            
            let aList = docClone.querySelector("#adminItemList");
            if(aList) { aList.innerHTML = ""; }

            let htmlContent = "<!DOCTYPE html>\n" + docClone.outerHTML;
            
            const dataRegex = /const initialData\s*=\s*\[[\s\S]*?\];/;
            const freshData = `const initialData = ${JSON.stringify(products, null, 12)};`;
            htmlContent = htmlContent.replace(dataRegex, freshData);
            
            const blob = new Blob([htmlContent], { type: "text/html;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "index.html"; 
            link.style.display = "none";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            alert("✅ โหลดไฟล์ index.html เรียบร้อย! นำไปอัปขึ้น Github ได้เลยครับ");
        }
