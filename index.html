<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOKHOO Studio - พิกัดของดีบอกต่อ</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&family=Prompt:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           เงื่อนไขที่ 1: ตั้งค่าเคลียร์สไตล์ในแท็กหลัก 
           ========================================= */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #000000; /* เลือกใช้สีดำเป็นหลักตามสไตล์ธีม */
            overflow-x: hidden;
        }

        :root {
            --color-black: #000000;
            --color-dark-gray: #2B2B2B;
            --color-mid-gray: #737373;
            --color-light-gray: #BDBDBD;
            --color-off-white: #F5F5F5;
            --color-white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', 'Noto Sans Thai', sans-serif; }

        /* =========================================
           เงื่อนไขที่ 3: ส่วนของ CSS สำหรับควบคุมการ เปิด-ปิด 
           ========================================= */
        /* สภาพปกติ (หน้าจอคอมพิวเตอร์) */
        .desktop-only-view {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            padding: 0 20px 40px 20px;
            position: relative;
            background-color: var(--color-black);
        }
        .mobile-only-view {
            display: none !important;
        }

        /* เมื่อหน้าจอเล็กกว่าหรือเท่ากับ 768px (หน้าจอมือถือ) */
        @media (max-width: 768px) {
            .desktop-only-view {
                display: none !important;
            }
            .mobile-only-view {
                display: block !important;
                width: 100%;
                background-color: var(--color-black);
                position: relative;
            }
        }

        /* =========================================
           [ STYLE: DESKTOP VERSION ]
           ========================================= */
        .desktop-only-view .admin-btn {
            position: absolute; top: 20px; right: 20px;
            background-color: transparent; color: var(--color-mid-gray);
            border: 1px solid var(--color-mid-gray); padding: 8px 15px;
            border-radius: 20px; font-size: 0.8rem; cursor: pointer; z-index: 100;
            transition: all 0.3s;
        }
        .desktop-only-view .admin-btn:hover { background-color: var(--color-white); color: var(--color-black); border-color: var(--color-white); }

        .desktop-only-view header { position: relative; width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; margin-top: 40px; margin-bottom: 60px; padding: 60px 0; }
        .desktop-only-view .hero-text { font-size: clamp(4rem, 18vw, 14rem); font-weight: 900; text-transform: uppercase; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); z-index: 0; white-space: nowrap; pointer-events: none; color: transparent; -webkit-text-stroke: 2px rgba(115, 115, 115, 0.4); animation: textIntro 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .desktop-only-view .hero-text::before { content: "HOKHOO"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(120deg, transparent 0%, transparent 40%, var(--color-white) 50%, transparent 60%, transparent 100%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5)); animation: shine 4s linear infinite; }
        .desktop-only-view .hero-text::after { content: "HOKHOO"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; color: transparent; -webkit-text-stroke: 1px var(--color-light-gray); z-index: -1; animation: pulseWave 3s ease-out infinite; }
        
        @keyframes textIntro { 0% { letter-spacing: -40px; opacity: 0; transform: translate(-50%, -40%) scale(0.8); } 100% { letter-spacing: 5px; opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        @keyframes shine { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
        @keyframes pulseWave { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.15); opacity: 0; letter-spacing: 15px; } }
        @keyframes floatOwl { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .desktop-only-view .logo-container { position: relative; z-index: 2; display: inline-block; margin-bottom: 40px; animation: floatOwl 4s ease-in-out infinite; }
        .desktop-only-view .logo-img { max-width: 320px; height: auto; filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.8)); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .desktop-only-view .logo-img:hover { transform: scale(1.08) rotate(-5deg); }

        .desktop-only-view .search-container { display: flex; gap: 12px; width: 100%; max-width: 600px; position: relative; z-index: 2; }
        .desktop-only-view .search-input { flex: 1; padding: 16px 25px; background-color: rgba(43, 43, 43, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); color: var(--color-white); font-size: 1rem; border-radius: 40px; outline: none; transition: all 0.3s; }
        .desktop-only-view .search-input:focus { border-color: var(--color-white); background-color: rgba(43, 43, 43, 0.9); }

        .desktop-only-view .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 30px; max-width: 1200px; width: 100%; }
        .desktop-only-view .product-card { background-color: var(--color-black); border: 1px solid var(--color-dark-gray); border-radius: 20px; overflow: hidden; padding: 15px; display: flex; flex-direction: column; transition: all 0.4s ease; }
        .desktop-only-view .product-card:hover { transform: translateY(-10px); border-color: var(--color-white); box-shadow: 0 15px 30px rgba(255, 255, 255, 0.08); background-color: #0a0a0a; }
        
        .desktop-only-view .product-link { display: block; border-radius: 12px; overflow: hidden; position: relative; }
        .desktop-only-view .product-link:hover .product-image { transform: scale(1.08); }
        .desktop-only-view .product-image { width: 100%; aspect-ratio: 1/1; object-fit: cover; background-color: var(--color-dark-gray); transition: transform 0.5s ease; display: block; }
        
        .desktop-only-view .badge-id { position: absolute; top: 10px; left: 10px; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(5px); color: var(--color-white); padding: 5px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; border: 1px solid rgba(255,255,255,0.3); z-index: 2; }
        .desktop-only-view .product-info { padding: 15px 5px 5px 5px; display: flex; flex-direction: column; flex-grow: 1; }
        .desktop-only-view .product-tags { font-size: 0.8rem; color: #aaaaaa; margin-bottom: 8px; font-weight: 300; }
        .desktop-only-view .product-title { font-size: 1.15rem; font-weight: 500; color: var(--color-white); margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }

        .desktop-only-view .view-btn { margin-top: auto; display: block; width: 100%; text-align: center; background-color: var(--color-white); color: var(--color-black); padding: 12px; border-radius: 12px; text-decoration: none; font-size: 0.95rem; font-weight: 700; transition: all 0.3s; box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1); }
        .desktop-only-view .view-btn:hover { background-color: #e0e0e0; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2); }

        .desktop-only-view .admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .desktop-only-view .admin-panel { background-color: var(--color-dark-gray); width: 100%; max-width: 600px; padding: 30px; border-radius: 20px; border: 1px solid var(--color-mid-gray); max-height: 90vh; overflow-y: auto; color: var(--color-white); }
        .desktop-only-view .admin-panel h2 { margin-bottom: 20px; border-bottom: 1px solid #555; padding-bottom: 10px; }
        .desktop-only-view .form-group { margin-bottom: 15px; }
        .desktop-only-view .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--color-light-gray); }
        .desktop-only-view .form-group input { width: 100%; padding: 10px; background: #111; border: 1px solid #444; color: white; border-radius: 8px; outline: none; }
        
        .desktop-only-view .btn-save { background: white; color: black; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .desktop-only-view .btn-save:hover { background: #ddd; }
        .desktop-only-view .btn-cancel { background: transparent; color: #ff6b6b; border: 1px solid #ff6b6b; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; display: none; }
        .desktop-only-view .btn-cancel:hover { background: rgba(255, 107, 107, 0.1); }
        .desktop-only-view .close-admin { float: right; cursor: pointer; font-size: 1.5rem; color: gray; }
        
        .desktop-only-view .admin-item-list { margin-top: 30px; }
        .desktop-only-view .admin-item { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; font-size: 0.9rem; color: var(--color-white); }
        .desktop-only-view .admin-actions { display: flex; gap: 8px; }
        .desktop-only-view .btn-edit { background: #4dabf7; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .desktop-only-view .btn-del { background: #ff4444; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }

        /* =========================================
           [ STYLE: MOBILE VERSION ]
           ========================================= */
        .mobile-only-view { padding: 0 5px 20px 5px; color: var(--color-white); } 
        .mobile-only-view .admin-btn { position: absolute; top: 10px; right: 10px; background-color: transparent; color: var(--color-mid-gray); border: 1px solid var(--color-mid-gray); padding: 5px 10px; font-size: 0.6rem; border-radius: 12px; cursor: pointer; z-index: 100; }
        
        .mobile-only-view header { position: relative; width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; padding: 30px 0 10px 0; margin-bottom: 20px; }
        .mobile-only-view .hero-text { font-size: 20vw; font-weight: 900; text-transform: uppercase; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); z-index: 0; white-space: nowrap; pointer-events: none; color: transparent; -webkit-text-stroke: 2px rgba(115, 115, 115, 0.4); animation: textIntro 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .mobile-only-view .hero-text::before { content: "HOKHOO"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(120deg, transparent 0%, transparent 40%, var(--color-white) 50%, transparent 60%, transparent 100%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5)); animation: shine 4s linear infinite; }
        .mobile-only-view .hero-text::after { content: "HOKHOO"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; color: transparent; -webkit-text-stroke: 1px var(--color-light-gray); z-index: -1; animation: pulseWave 3s ease-out infinite; }
        
        .mobile-only-view .logo-container { position: relative; z-index: 2; display: inline-block; margin-bottom: 20px; animation: floatOwl 4s ease-in-out infinite; }
        .mobile-only-view .logo-img { max-width: 130px; height: auto; filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.8)); }
        
        .mobile-only-view .search-container { display: flex; gap: 12px; width: 100%; max-width: 600px; position: relative; z-index: 2; padding: 0 10px; }
        .mobile-only-view .search-input { flex: 1; padding: 10px 15px; background-color: rgba(43, 43, 43, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); color: var(--color-white); font-size: 0.85rem; border-radius: 20px; outline: none; transition: all 0.3s; }
        
        .mobile-only-view .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 0; width: 100%; }
        .mobile-only-view .product-card { background-color: var(--color-black); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; padding: 5px; display: flex; flex-direction: column; }
        
        .mobile-only-view .product-link { display: block; border-radius: 6px; overflow: hidden; position: relative; }
        .mobile-only-view .product-image { width: 100%; aspect-ratio: 1/1; object-fit: cover; background-color: var(--color-dark-gray); display: block; }
        
        .mobile-only-view .badge-id { position: absolute; font-size: 0.45rem; padding: 2px 4px; top: 4px; left: 4px; border-radius: 4px; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(5px); color: var(--color-white); border: 1px solid rgba(255,255,255,0.3); z-index: 2; }
        .mobile-only-view .product-info { padding: 5px 2px 2px 2px; display: flex; flex-direction: column; flex-grow: 1; }
        .mobile-only-view .product-tags { font-size: 0.5rem; color: #aaaaaa; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 300; }
        .mobile-only-view .product-title { font-size: 0.65rem; font-weight: 500; color: var(--color-white); margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.2; }
        
        .mobile-only-view .view-btn { margin-top: auto; display: block; width: 100%; text-align: center; background-color: var(--color-white); color: var(--color-black); padding: 5px 2px; font-size: 0.6rem; border-radius: 6px; font-weight: 600; text-decoration: none; }

        .mobile-only-view .admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .mobile-only-view .admin-panel { background-color: var(--color-dark-gray); width: 100%; max-width: 600px; padding: 15px; border-radius: 20px; border: 1px solid var(--color-mid-gray); max-height: 90vh; overflow-y: auto; color: var(--color-white); }
        .mobile-only-view .admin-panel h2 { margin-bottom: 20px; border-bottom: 1px solid #555; padding-bottom: 10px; }
        .mobile-only-view .form-group { margin-bottom: 15px; }
        .mobile-only-view .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--color-light-gray); }
        .mobile-only-view .form-group input { width: 100%; padding: 10px; background: #111; border: 1px solid #444; color: white; border-radius: 8px; outline: none; }
        
        .mobile-only-view .btn-save { background: white; color: black; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .mobile-only-view .btn-cancel { background: transparent; color: #ff6b6b; border: 1px solid #ff6b6b; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; display: none; }
        .mobile-only-view .close-admin { float: right; cursor: pointer; font-size: 1.5rem; color: gray; }
        
        .mobile-only-view .admin-item-list { margin-top: 30px; }
        .mobile-only-view .admin-item { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; background: #111; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; font-size: 0.9rem; color: var(--color-white); width: 100%; }
        .mobile-only-view .admin-actions { display: flex; gap: 8px; width: 100%; justify-content: space-between; }
        .mobile-only-view .btn-edit { background: #4dabf7; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; flex: 1; text-align: center; }
        .mobile-only-view .btn-del { background: #ff4444; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; flex: 1; text-align: center; }
    </style>
</head>
<body>

    <div class="desktop-only-view">
        <button class="admin-btn" onclick="openAdmin()">Admin System</button>

        <header>
            <div class="hero-text">HOKHOO</div>
            <div class="logo-container">
                <img src="https://img2.pic.in.th/7a857774-c44a-418e-9438-27704f856485.jfif.png" alt="Hokhoo Studio" class="logo-img">
            </div>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="ค้นหารหัสพิกัด หรือ #แฮชแท็ก เช่น #แต่งห้อง..." onkeyup="filterProducts()">
            </div>
        </header>

        <main id="productGrid" class="product-grid"></main>

        <div id="adminModal" class="admin-modal">
            <div class="admin-panel">
                <span class="close-admin" onclick="closeAdmin()">&times;</span>
                <h2>🛠️ จัดการพิกัดสินค้า (Creator)</h2>
                
                <form id="addProductForm">
                    <input type="hidden" id="edit_index" value="-1">
                    
                    <div class="form-group">
                        <label>รหัสอ้างอิงพิกัด (เช่น HK01)</label>
                        <input type="text" id="a_id" required>
                    </div>
                    <div class="form-group">
                        <label>ชื่อสินค้า / ไฮไลท์จุดเด่น</label>
                        <input type="text" id="a_name" required placeholder="เช่น โคมไฟตั้งโต๊ะสุดมินิมอล">
                    </div>
                    <div class="form-group">
                        <label>ลิ้งค์รูปภาพหน้าปก (URL)</label>
                        <input type="url" id="a_image" required placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>ลิ้งค์พิกัดสินค้า (Affiliate Link / Shopee / Lazada)</label>
                        <input type="url" id="a_link" required placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>แฮชแท็ก (คั่นด้วยช่องว่าง เช่น #ของดีบอกต่อ #มินิมอล)</label>
                        <input type="text" id="a_tags" placeholder="#แต่งโต๊ะทำงาน #ของมันต้องมี">
                    </div>
                    <button type="submit" id="submitBtn" class="btn-save">+ เพิ่มพิกัดใหม่</button>
                    <button type="button" id="cancelEditBtn" class="btn-cancel" onclick="cancelEdit()">ยกเลิกการแก้ไข</button>
                </form>

                <div class="admin-item-list" id="adminItemList"></div>
            </div>
        </div>
    </div>


    <div class="mobile-only-view">
        <button class="admin-btn" onclick="openAdminMobile()">Admin System</button>

        <header>
            <div class="hero-text">HOKHOO</div>
            <div class="logo-container">
                <img src="https://img2.pic.in.th/7a857774-c44a-418e-9438-27704f856485.jfif.png" alt="Hokhoo Studio" class="logo-img">
            </div>
            <div class="search-container">
                <input type="text" id="searchInputMobile" class="search-input" placeholder="ค้นหารหัสพิกัด หรือ #แฮชแท็ก เช่น #แต่งห้อง..." onkeyup="filterProductsMobile()">
            </div>
        </header>

        <main id="productGridMobile" class="product-grid"></main>

        <div id="adminModalMobile" class="admin-modal">
            <div class="admin-panel">
                <span class="close-admin" onclick="closeAdminMobile()">&times;</span>
                <h2>🛠️ จัดการพิกัดสินค้า (Creator Mobile)</h2>
                
                <form id="addProductFormMobile">
                    <input type="hidden" id="edit_index_mobile" value="-1">
                    <div class="form-group">
                        <label>รหัสอ้างอิงพิกัด (เช่น HK01)</label>
                        <input type="text" id="m_a_id" required>
                    </div>
                    <div class="form-group">
                        <label>ชื่อสินค้า / ไฮไลท์จุดเด่น</label>
                        <input type="text" id="m_a_name" required placeholder="เช่น โคมไฟตั้งโต๊ะสุดมินิมอล">
                    </div>
                    <div class="form-group">
                        <label>ลิ้งค์รูปภาพหน้าปก (URL)</label>
                        <input type="url" id="m_a_image" required placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>ลิ้งค์พิกัดสินค้า (Affiliate Link / Shopee / Lazada)</label>
                        <input type="url" id="m_a_link" required placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>แฮชแท็ก (คั่นด้วยช่องว่าง เช่น #ของดีบอกต่อ #มินิมอล)</label>
                        <input type="text" id="m_a_tags" placeholder="#แต่งโต๊ะทำงาน #ของมันต้องมี">
                    </div>
                    <button type="submit" id="submitBtnMobile" class="btn-save">+ เพิ่มพิกัดใหม่</button>
                    <button type="button" id="cancelEditBtnMobile" class="btn-cancel" onclick="cancelEditMobile()">ยกเลิกการแก้ไข</button>
                </form>

                <div class="admin-item-list" id="adminItemListMobile"></div>
            </div>
        </div>
    </div>

    <script>
        // ข้อมูลตั้งต้นที่รวมเอาสินค้าทั้งหมดจากทั้งสองเวอร์ชันมารวมกัน (6 ชิ้น)
        const initialData = [
            { id: "HK01", name: "แก้วเก็บความเย็นสีดำด้าน สุดเท่", image: "https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?q=80&w=500", link: "#", tags: "#แก้วน้ำ #สายดาร์ก #ของดีบอกต่อ" },
            { id: "HK02", name: "กล่องจัดระเบียบโต๊ะทำงาน สไตล์ Studio", image: "https://images.unsplash.com/photo-1542496658-e33a6d0d50f6?q=80&w=500", link: "#", tags: "#จัดโต๊ะคอม #กล่องดำ" },
            { id: "HK03", name: "ผ้าห่มลายน่ารักๆ นุ่มฟินมากก", image: "https://images.unsplash.com/photo-1581291518633-83b4ebd1d83e?q=80&w=500", link: "#", tags: "#แต่งห้องนอน #มินิมอล" },
            { id: "HK04", name: "กระเป๋าใส่ Laptop คลีนๆ ปกป้องดีเยี่ยม", image: "https://images.unsplash.com/photo-1611186871348-b1ce696e52c9?q=80&w=500", link: "#", tags: "#ไอที #กระเป๋า" },
            { id: "HK05", name: "หูฟังดีไซน์มินิมอล โทนสีคลีน", image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=500", link: "#", tags: "#หูฟัง #ไอที" },
            { id: "HK06", name: "นาฬิกาข้อมือสายคลาสสิก", image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=500", link: "#", tags: "#นาฬิกา #ของขวัญ" }
        ];

        // ใช้ LocalStorage ร่วมกันเพื่อให้หลังบ้านอัปเดตไปพร้อมกัน
        let products = JSON.parse(localStorage.getItem('hokhooCreatorData')) || initialData;

        // สั่งทำงานเพื่อเซฟและเรนเดอร์ครั้งแรกให้กับทั้งสองเวอร์ชัน
        saveData();

        function saveData() {
            localStorage.setItem('hokhooCreatorData', JSON.stringify(products));
            renderProducts(products);
            renderProductsMobile(products);
            renderAdminList();
            renderAdminListMobile();
        }

        /* -----------------------------------------
           JAVASCRIPT FOR DESKTOP
           ----------------------------------------- */
        function renderProducts(dataToRender) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = ""; 

            if(dataToRender.length === 0) {
                grid.innerHTML = "<p style='text-align:center; width:100%; color:#777;'>ไม่พบพิกัดที่คุณค้นหา ลองเปลี่ยนคำค้นหาดูน้า</p>";
                return;
            }

            dataToRender.forEach(p => {
                const card = `
                <div class="product-card">
                    <a href="${p.link}" class="product-link" target="_blank">
                        <div class="badge-id">${p.id}</div> 
                        <img src="${p.image}" alt="${p.name}" class="product-image" loading="lazy">
                    </a>
                    <div class="product-info">
                        <div class="product-tags">${p.tags}</div> 
                        <h3 class="product-title">${p.name}</h3>
                        <a href="${p.link}" target="_blank" class="view-btn">📍 ดูพิกัดสินค้า</a>
                    </div>
                </div>`;
                grid.innerHTML += card;
            });
        }

        function filterProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = products.filter(p => 
                p.id.toLowerCase().includes(query) || 
                p.tags.toLowerCase().includes(query) ||
                p.name.toLowerCase().includes(query)
            );
            renderProducts(filtered);
        }

        function openAdmin() {
            const password = prompt("กรุณาใส่รหัสผ่าน Admin:");
            if (password === "vapanika3541") {
                document.getElementById('adminModal').style.display = "flex";
                renderAdminList();
            } else if(password !== null) {
                alert("รหัสผ่านไม่ถูกต้อง!");
            }
        }
        
        function closeAdmin() {
            document.getElementById('adminModal').style.display = "none";
            cancelEdit(); 
        }

        function renderAdminList() {
            const list = document.getElementById('adminItemList');
            list.innerHTML = "";
            products.forEach((p, index) => {
                list.innerHTML += `
                <div class="admin-item">
                    <span><b>${p.id}</b> - ${p.name.substring(0, 20)}...</span>
                    <div class="admin-actions">
                        <button class="btn-edit" onclick="editProduct(${index})">แก้ไข</button>
                        <button class="btn-del" onclick="deleteProduct(${index})">ลบ</button>
                    </div>
                </div>`;
            });
        }

        function editProduct(index) {
            const p = products[index];
            document.getElementById('edit_index').value = index;
            document.getElementById('a_id').value = p.id;
            document.getElementById('a_name').value = p.name;
            document.getElementById('a_image').value = p.image;
            document.getElementById('a_link').value = p.link;
            document.getElementById('a_tags').value = p.tags;
            
            document.getElementById('submitBtn').innerText = "💾 บันทึกการแก้ไขพิกัด";
            document.getElementById('submitBtn').style.backgroundColor = "#4dabf7";
            document.getElementById('submitBtn').style.color = "white";
            document.getElementById('cancelEditBtn').style.display = "block";
        }

        function cancelEdit() {
            document.getElementById('addProductForm').reset();
            document.getElementById('edit_index').value = "-1";
            document.getElementById('submitBtn').innerText = "+ เพิ่มพิกัดใหม่";
            document.getElementById('submitBtn').style.backgroundColor = "white";
            document.getElementById('submitBtn').style.color = "black";
            document.getElementById('cancelEditBtn').style.display = "none";
        }

        document.getElementById('addProductForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editIndex = parseInt(document.getElementById('edit_index').value);
            const newData = {
                id: document.getElementById('a_id').value.toUpperCase(),
                name: document.getElementById('a_name').value,
                image: document.getElementById('a_image').value,
                link: document.getElementById('a_link').value,
                tags: document.getElementById('a_tags').value
            };

            if (editIndex > -1) {
                products[editIndex] = newData;
                alert("บันทึกการแก้ไขพิกัดเรียบร้อย!");
                cancelEdit();
            } else {
                products.unshift(newData);
                this.reset();
                alert("เพิ่มพิกัดใหม่สำเร็จ!");
            }
            saveData();
        });

        function deleteProduct(index) {
            if(confirm("คุณแน่ใจหรือไม่ว่าจะลบพิกัดสินค้านี้?")) {
                products.splice(index, 1);
                saveData();
                cancelEdit(); 
            }
        }


        /* -----------------------------------------
           JAVASCRIPT FOR MOBILE
           ----------------------------------------- */
        function renderProductsMobile(dataToRender) {
            const grid = document.getElementById('productGridMobile');
            grid.innerHTML = ""; 

            if(dataToRender.length === 0) {
                grid.innerHTML = "<p style='text-align:center; width:100%; color:#777; font-size:0.8rem;'>ไม่พบพิกัดที่คุณค้นหา ลองเปลี่ยนคำค้นหาดูน้า</p>";
                return;
            }

            dataToRender.forEach(p => {
                const card = `
                <div class="product-card">
                    <a href="${p.link}" class="product-link" target="_blank">
                        <div class="badge-id">${p.id}</div> 
                        <img src="${p.image}" alt="${p.name}" class="product-image" loading="lazy">
                    </a>
                    <div class="product-info">
                        <div class="product-tags">${p.tags}</div> 
                        <h3 class="product-title">${p.name}</h3>
                        <a href="${p.link}" target="_blank" class="view-btn">📍 ดูพิกัด</a>
                    </div>
                </div>`;
                grid.innerHTML += card;
            });
        }

        function filterProductsMobile() {
            const query = document.getElementById('searchInputMobile').value.toLowerCase().trim();
            const filtered = products.filter(p => 
                p.id.toLowerCase().includes(query) || 
                p.tags.toLowerCase().includes(query) ||
                p.name.toLowerCase().includes(query)
            );
            renderProductsMobile(filtered);
        }

        function openAdminMobile() {
            const password = prompt("กรุณาใส่รหัสผ่าน Admin:");
            if (password === "vapanika3541") {
                document.getElementById('adminModalMobile').style.display = "flex";
                renderAdminListMobile();
            } else if(password !== null) {
                alert("รหัสผ่านไม่ถูกต้อง!");
            }
        }

        function closeAdminMobile() {
            document.getElementById('adminModalMobile').style.display = "none";
            cancelEditMobile(); 
        }

        function renderAdminListMobile() {
            const list = document.getElementById('adminItemListMobile');
            list.innerHTML = "";
            products.forEach((p, index) => {
                list.innerHTML += `
                <div class="admin-item">
                    <span><b>${p.id}</b> - ${p.name.substring(0, 20)}...</span>
                    <div class="admin-actions">
                        <button class="btn-edit" onclick="editProductMobile(${index})">แก้ไข</button>
                        <button class="btn-del" onclick="deleteProductMobile(${index})">ลบ</button>
                    </div>
                </div>`;
            });
        }

        function editProductMobile(index) {
            const p = products[index];
            document.getElementById('edit_index_mobile').value = index;
            document.getElementById('m_a_id').value = p.id;
            document.getElementById('m_a_name').value = p.name;
            document.getElementById('m_a_image').value = p.image;
            document.getElementById('m_a_link').value = p.link;
            document.getElementById('m_a_tags').value = p.tags;
            
            document.getElementById('submitBtnMobile').innerText = "💾 บันทึกการแก้ไขพิกัด";
            document.getElementById('submitBtnMobile').style.backgroundColor = "#4dabf7";
            document.getElementById('submitBtnMobile').style.color = "white";
            document.getElementById('cancelEditBtnMobile').style.display = "block";
        }

        function cancelEditMobile() {
            document.getElementById('addProductFormMobile').reset();
            document.getElementById('edit_index_mobile').value = "-1";
            document.getElementById('submitBtnMobile').innerText = "+ เพิ่มพิกัดใหม่";
            document.getElementById('submitBtnMobile').style.backgroundColor = "white";
            document.getElementById('submitBtnMobile').style.color = "black";
            document.getElementById('cancelEditBtnMobile').style.display = "none";
        }

        document.getElementById('addProductFormMobile').addEventListener('submit', function(e) {
            e.preventDefault();
            const editIndex = parseInt(document.getElementById('edit_index_mobile').value);
            const newData = {
                id: document.getElementById('m_a_id').value.toUpperCase(),
                name: document.getElementById('m_a_name').value,
                image: document.getElementById('m_a_image').value,
                link: document.getElementById('m_a_link').value,
                tags: document.getElementById('m_a_tags').value
            };

            if (editIndex > -1) {
                products[editIndex] = newData;
                alert("บันทึกการแก้ไขพิกัดเรียบร้อย!");
                cancelEditMobile();
            } else {
                products.unshift(newData);
                this.reset();
                alert("เพิ่มพิกัดใหม่สำเร็จ!");
            }
            saveData();
        });

        function deleteProductMobile(index) {
            if(confirm("คุณแน่ใจหรือไม่ว่าจะลบพิกัดสินค้านี้?")) {
                products.splice(index, 1);
                saveData();
                cancelEditMobile(); 
            }
        }
    </script>
</body>
