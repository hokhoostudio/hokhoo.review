<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOKHOO Studio - พิกัดของดีบอกต่อ (Recommended Items)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700;900&amp;family=Prompt:wght@300;400;500;700;900&amp;display=swap" rel="stylesheet">
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #000000;
            overflow-x: hidden;
        }

        :root {
            --color-black: #000000;
            --color-dark-gray: #2B2B2B;
            --color-mid-gray: #737373;
            --color-light-gray: #BDBDBD;
            --color-off-white: #F5F5F5;
            --color-white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', 'Noto Sans Thai', sans-serif; }

        /* การควบคุมการ เปิด-ปิด หน้าจอ */
        .desktop-only-view {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            padding: 0 20px 40px 20px;
            position: relative;
            background-color: var(--color-black);
        }
        .mobile-only-view {
            display: none !important;
        }

        @media (max-width: 768px) {
            .desktop-only-view {
                display: none !important;
            }
            .mobile-only-view {
                display: block !important;
                width: 100%;
                background-color: var(--color-black);
                position: relative;
            }
        }

        /* [ STYLE: DESKTOP VERSION ] */
        .desktop-only-view .admin-btn {
            position: absolute; top: 20px; right: 20px;
            background-color: transparent; color: var(--color-mid-gray);
            border: 1px solid var(--color-mid-gray); padding: 8px 15px;
            border-radius: 20px; font-size: 0.8rem; cursor: pointer; z-index: 100;
            transition: all 0.3s;
        }
        .desktop-only-view .admin-btn:hover { background-color: var(--color-white); color: var(--color-black); border-color: var(--color-white); }

        .desktop-only-view header { position: relative; width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; margin-top: 40px; margin-bottom: 60px; padding: 60px 0; }
        .desktop-only-view .hero-text { font-size: clamp(4rem, 18vw, 14rem); font-weight: 900; text-transform: uppercase; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); z-index: 0; white-space: nowrap; pointer-events: none; color: transparent; -webkit-text-stroke: 2px rgba(115, 115, 115, 0.4); animation: textIntro 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .desktop-only-view .hero-text::before { content: "HOKHOO"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(120deg, transparent 0%, transparent 40%, var(--color-white) 50%, transparent 60%, transparent 100%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5)); animation: shine 4s linear infinite; }
        .desktop-only-view .hero-text::after { content: "HOKHOO"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; color: transparent; -webkit-text-stroke: 1px var(--color-light-gray); z-index: -1; animation: pulseWave 3s ease-out infinite; }
        
        @keyframes textIntro { 0% { letter-spacing: -40px; opacity: 0; transform: translate(-50%, -40%) scale(0.8); } 100% { letter-spacing: 5px; opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        @keyframes shine { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
        @keyframes pulseWave { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.15); opacity: 0; letter-spacing: 15px; } }
        @keyframes floatOwl { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .desktop-only-view .logo-container { position: relative; z-index: 2; display: inline-block; margin-bottom: 40px; animation: floatOwl 4s ease-in-out infinite; }
        .desktop-only-view .logo-img { max-width: 320px; height: auto; filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.8)); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .desktop-only-view .logo-img:hover { transform: scale(1.08) rotate(-5deg); }

        .desktop-only-view .search-container { display: flex; gap: 12px; width: 100%; max-width: 600px; position: relative; z-index: 2; margin-bottom: 40px; }
        .desktop-only-view .search-input { flex: 1; padding: 16px 25px; background-color: rgba(43, 43, 43, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); color: var(--color-white); font-size: 1rem; border-radius: 40px; outline: none; transition: all 0.3s; }
        .desktop-only-view .search-input:focus { border-color: var(--color-white); background-color: rgba(43, 43, 43, 0.9); }

        .desktop-only-view .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 30px; max-width: 1200px; width: 100%; }
        .desktop-only-view .product-card { background-color: var(--color-black); border: 1px solid var(--color-dark-gray); border-radius: 20px; overflow: hidden; padding: 15px; display: flex; flex-direction: column; transition: all 0.4s ease; }
        .desktop-only-view .product-card:hover { transform: translateY(-10px); border-color: var(--color-white); box-shadow: 0 15px 30px rgba(255, 255, 255, 0.08); background-color: #0a0a0a; }
        
        .desktop-only-view .product-link { display: block; border-radius: 12px; overflow: hidden; position: relative; width: 100%; }
        .desktop-only-view .product-link:hover .product-image { transform: scale(1.08); }
        
        /* ปรับ Aspect Ratio เป็น 4:5 สำหรับสัดส่วน 1080x1350 */
        .desktop-only-view .product-image { width: 100%; aspect-ratio: 4/5; object-fit: cover; background-color: var(--color-dark-gray); transition: transform 0.5s ease; display: block; }
        
        .desktop-only-view .badge-id { position: absolute; top: 10px; left: 10px; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(5px); color: var(--color-white); padding: 5px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; border: 1px solid rgba(255,255,255,0.3); z-index: 2; }
        .desktop-only-view .product-info { padding: 15px 5px 5px 5px; display: flex; flex-direction: column; flex-grow: 1; }
        .desktop-only-view .product-tags { font-size: 0.8rem; color: #aaaaaa; margin-bottom: 8px; font-weight: 300; }
        .desktop-only-view .product-title { font-size: 1.15rem; font-weight: 500; color: var(--color-white); margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
        
        /* สไตล์แปลภาษาอังกฤษแบบตัวเล็กรองลงมา */
        .en-subtext { display: block; font-size: 0.8em; font-weight: 300; color: #888888; margin-top: 4px; text-transform: none; letter-spacing: 0px; }

        .desktop-only-view .view-btn { margin-top: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; text-align: center; background-color: var(--color-white); color: var(--color-black); padding: 10px; border-radius: 12px; text-decoration: none; font-size: 0.95rem; font-weight: 700; transition: all 0.3s; box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1); line-height: 1.3; }
        .desktop-only-view .view-btn:hover { background-color: #e0e0e0; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2); }
        .desktop-only-view .view-btn.disabled { background-color: var(--color-dark-gray); color: var(--color-mid-gray); pointer-events: none; box-shadow: none; }
        .desktop-only-view .view-btn .en-subtext { color: #888888; margin-top: 1px; }

        /* Admin Modal & Panel */
        .admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.75); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .admin-panel { background-color: var(--color-dark-gray); width: 100%; max-width: 600px; padding: 30px; border-radius: 20px; border: 1px solid var(--color-mid-gray); max-height: 90vh; overflow-y: auto; color: var(--color-white); position: relative; }
        .admin-panel h2 { margin-bottom: 20px; border-bottom: 1px solid #555; padding-bottom: 10px; font-size: 1.4rem; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--color-light-gray); }
        .form-group input { width: 100%; padding: 10px; background: #111; border: 1px solid #444; color: white; border-radius: 8px; outline: none; }
        
        .btn-save { background: white; color: black; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 1rem; }
        .btn-save:hover { background: #ddd; }
        .btn-placeholder { background: #ff922b; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 8px; font-size: 1rem; }
        .btn-placeholder:hover { background: #f78416; }
        .btn-download { background: #12b886; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 25px; font-size: 1rem; border: 1px dashed white; }
        .btn-download:hover { background: #0ca678; }
        .btn-cancel { background: transparent; color: #ff6b6b; border: 1px solid #ff6b6b; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; display: none; }
        .close-admin { float: right; cursor: pointer; font-size: 1.5rem; color: gray; }
        
        .admin-item-list { margin-top: 25px; border-top: 1px dashed #555; padding-top: 20px; }
        .admin-item { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; font-size: 0.9rem; color: var(--color-white); }
        .admin-actions { display: flex; gap: 8px; }
        .btn-edit { background: #4dabf7; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .btn-del { background: #ff4444; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }

        /* [ STYLE: MOBILE VERSION ] */
        .mobile-only-view { padding: 0 5px 20px 5px; color: var(--color-white); } 
        
        .mobile-only-view header { position: relative; width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; padding: 30px 0 10px 0; margin-bottom: 20px; }
        .mobile-only-view .hero-text { font-size: 20vw; font-weight: 900; text-transform: uppercase; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); z-index: 0; white-space: nowrap; pointer-events: none; color: transparent; -webkit-text-stroke: 2px rgba(115, 115, 115, 0.4); animation: textIntro 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .mobile-only-view .hero-text::before { content: "HOKHOO"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(120deg, transparent 0%, transparent 40%, var(--color-white) 50%, transparent 60%, transparent 100%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5)); animation: shine 4s linear infinite; }
        .mobile-only-view .hero-text::after { content: "HOKHOO"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; color: transparent; -webkit-text-stroke: 1px var(--color-light-gray); z-index: -1; animation: pulseWave 3s ease-out infinite; }
        
        .mobile-only-view .logo-container { position: relative; z-index: 2; display: inline-block; margin-bottom: 20px; animation: floatOwl 4s ease-in-out infinite; }
        .mobile-only-view .logo-img { max-width: 130px; height: auto; filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.8)); }
        
        .mobile-only-view .search-container { display: flex; gap: 12px; width: 100%; max-width: 600px; position: relative; z-index: 2; padding: 0 10px; margin-bottom: 15px; }
        .mobile-only-view .search-input { flex: 1; padding: 10px 15px; background-color: rgba(43, 43, 43, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); color: var(--color-white); font-size: 0.85rem; border-radius: 20px; outline: none; transition: all 0.3s; }
        
        .mobile-only-view .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 0; width: 100%; }
        .mobile-only-view .product-card { background-color: var(--color-black); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; padding: 5px; display: flex; flex-direction: column; }
        
        .mobile-only-view .product-link { display: block; border-radius: 6px; overflow: hidden; position: relative; width: 100%; }
        
        /* ปรับ Aspect Ratio เป็น 4:5 สำหรับ Mobile เช่นเดียวกัน */
        .mobile-only-view .product-image { width: 100%; aspect-ratio: 4/5; object-fit: cover; background-color: var(--color-dark-gray); display: block; }
        
        .mobile-only-view .badge-id { position: absolute; font-size: 0.45rem; padding: 2px 4px; top: 4px; left: 4px; border-radius: 4px; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(5px); color: var(--color-white); border: 1px solid rgba(255,255,255,0.3); z-index: 2; }
        .mobile-only-view .product-info { padding: 5px 2px 2px 2px; display: flex; flex-direction: column; flex-grow: 1; }
        .mobile-only-view .product-tags { font-size: 0.5rem; color: #aaaaaa; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 300; }
        .mobile-only-view .product-title { font-size: 0.65rem; font-weight: 500; color: var(--color-white); margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.2; }
        .mobile-only-view .product-title .en-subtext { font-size: 0.8em; line-height: 1.1; margin-top: 2px; color: #666666; }

        .mobile-only-view .view-btn { margin-top: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; text-align: center; background-color: var(--color-white); color: var(--color-black); padding: 4px 2px; font-size: 0.6rem; border-radius: 6px; font-weight: 600; text-decoration: none; line-height: 1.2; }
        .mobile-only-view .view-btn.disabled { background-color: var(--color-dark-gray); color: var(--color-mid-gray); pointer-events: none; }
        .mobile-only-view .view-btn .en-subtext { font-size: 0.75em; color: #666666; margin-top: 1px; }
    </style>
</head>
<body>

    <div class="desktop-only-view">
        <button class="admin-btn" onclick="openAdmin()">
            ระบบผู้ดูแลระบบ
            <span class="en-subtext" style="color:var(--color-mid-gray); font-size:10px; margin-top:0;">Admin System (Creator)</span>
        </button>

        <header>
            <div class="hero-text">HOKHOO</div>
            <div class="logo-container">
                <img src="https://img2.pic.in.th/7a857774-c44a-418e-9438-27704f856485.jfif.png" alt="Hokhoo Studio" class="logo-img">
            </div>
            <div style="text-align: center; color: var(--color-white); margin-top: -20px; margin-bottom: 30px; z-index: 2;">
                <h1 style="font-size: 1.8rem; font-weight: 700;">พิกัดของดีบอกต่อ</h1>
                <p class="en-subtext" style="font-size: 1rem;">Recommended Items & Shopping Coordinates</p>
            </div>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 ค้นหารหัสพิกัด ชื่อ หรือ #แฮชแท็ก... / Search ID, Name or #Hashtags..." onkeyup="filterProductsAll()">
            </div>
        </header>

        <main id="productGrid" class="product-grid"></main>

        <div id="adminModal" class="admin-modal">
            <div class="admin-panel">
                <span class="close-admin" onclick="closeAdmin()">×</span>
                <h2>🛠️ จัดการพิกัดสินค้า (Creator Panel)</h2>
                <p style="font-size:0.8rem; color:#aaa; margin-bottom:15px;">*กรอกแค่ภาษาไทย ระบบจะแปลเป็นอังกฤษให้ด้านหน้าบ้านอัตโนมัติครับ / Fill TH only, system translates automatically.*</p>
                
                <form id="addProductForm">
                    <input type="hidden" id="edit_index" value="-1">
                    
                    <div class="form-group">
                        <label>รหัสอ้างอิงพิกัด / Item ID (เช่น HK01)</label>
                        <input type="text" id="a_id" required="">
                    </div>
                    <div class="form-group">
                        <label>ชื่อสินค้า / Product Name (ภาษาไทยเท่านั้น)</label>
                        <input type="text" id="a_name" required="" placeholder="เช่น โคมไฟตั้งโต๊ะสุดมินิมอล">
                    </div>
                    <div class="form-group">
                        <label>ลิ้งค์รูปภาพหน้าปก / Image URL</label>
                        <input type="url" id="a_image" required="" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>ลิ้งค์พิกัดสินค้า / Shopping Link (Shopee / Lazada / TikTok)</label>
                        <input type="url" id="a_link" required="" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>แฮชแท็ก / Hashtags (คั่นด้วยช่องว่าง เช่น #ของดีบอกต่อ #มินิมอล)</label>
                        <input type="text" id="a_tags" placeholder="#แต่งโต๊ะทำงาน #ของมันต้องมี">
                    </div>
                    <button type="submit" id="submitBtn" class="btn-save">+ เพิ่มพิกัดใหม่ (Add New Item)</button>
                    <button type="button" class="btn-placeholder" onclick="addPlaceholderData()">➕ เพิ่มช่องตัวอย่างสินค้า (ยังไม่มีสินค้า / Add Placeholder)</button>
                    <button type="button" id="cancelEditBtn" class="btn-cancel" onclick="cancelEdit()">ยกเลิกการแก้ไข (Cancel)</button>
                </form>

                <div class="admin-item-list" id="adminItemList"></div>
                
                <button type="button" class="btn-download" onclick="downloadHTMLFile()">💾 ดาวน์โหลดไฟล์ HTML สำหรับอัปเดตเว็บ (Download index.html)</button>
            </div>
        </div>
    </div>

    <div class="mobile-only-view">
        <header>
            <div class="hero-text">HOKHOO</div>
            <div class="logo-container">
                <img src="https://img2.pic.in.th/7a857774-c44a-418e-9438-27704f856485.jfif.png" alt="Hokhoo Studio" class="logo-img">
            </div>
            <div style="text-align: center; color: var(--color-white); margin-top: -10px; margin-bottom: 15px; z-index: 2; padding: 0 10px;">
                <h1 style="font-size: 1.1rem; font-weight: 700;">พิกัดของดีบอกต่อ</h1>
                <p class="en-subtext" style="font-size: 0.65rem; margin-top: 1px;">Recommended Items & Coordinates</p>
            </div>
            <div class="search-container">
                <input type="text" id="searchInputMobile" class="search-input" placeholder="🔍 ค้นหา... / Search..." onkeyup="filterProductsMobileAll()">
            </div>
        </header>

        <main id="productGridMobile" class="product-grid"></main>
    </div>

    <script>
        // ข้อมูลสินค้าตั้งต้นแปลภาษาอัตโนมัติ
        const initialData = [
            {
                "id": "HK03",
                "name": "ยังไม่มีสินค้าในรหัสนี้ (กำลังอัปเดตพิกัดเร็วๆ นี้)",
                "name_en": "No item in this slot (Updating coordinates soon)",
                "image": "https://placehold.co/1080x1350/1a1a1a/ffffff?text=🔒+HOKHOO+STUDIO",
                "link": "javascript:void(0);",
                "tags": "#กำลังอัปเดต #ของดีบอกต่อ"
            },
            {
                "id": "HK02",
                "name": "ยังไม่มีสินค้าในรหัสนี้ (กำลังอัปเดตพิกัดเร็วๆ นี้)",
                "name_en": "No item in this slot (Updating coordinates soon)",
                "image": "https://placehold.co/1080x1350/1a1a1a/ffffff?text=🔒+HOKHOO+STUDIO",
                "link": "javascript:void(0);",
                "tags": "#กำลังอัปเดต #ของดีบอกต่อ"
            },
            {
                "id": "HH001",
                "name": "HelloPOLO รองเท้าลายอุ้งเท้าแมว",
                "name_en": "HelloPOLO Cat Paw Slipper Shoes",
                "image": "https://img2.pic.in.th/hh001.jpg",
                "link": "https://vt.tiktok.com/ZS96JMxQ5SLHx-Lxbx3/",
                "tags": "#รองเท้าแตะ #รองเท้าในบ้าน #สลิปเปอร์"
            }
        ];

        let products = JSON.parse(localStorage.getItem('hokhooCreatorData')) || initialData;

        saveData();

        function saveData() {
            localStorage.setItem('hokhooCreatorData', JSON.stringify(products));
            renderProducts(products);
            renderProductsMobile(products);
            renderAdminList();
        }

        /* ระบบแปลคำศัพท์อัจฉริยะอัตโนมัติ (Automated Translation Engine) */
        function translateTextAutomated(text) {
            if (!text) return "";
            let lowerText = text.toLowerCase();
            let translations = [];

            // คลังคำศัพท์คีย์เวิร์ดระบบช้อปปิ้ง
            const dictionary = {
                "รองเท้า": "Shoes / Slippers",
                "แมว": "Cat design",
                "อุ้งเท้า": "Paw",
                "แตะ": "Sandals",
                "ในบ้าน": "Indoor",
                "สลิปเปอร์": "Slippers",
                "แก้วเก็บความเย็น": "Tumbler / Cold Storage Cup",
                "โคมไฟ": "Desk Lamp / Light",
                "กล่องจัดระเบียบ": "Organizer Box",
                "ผ้าห่ม": "Blanket",
                "มินิมอล": "Minimalist Style",
                "สุดเท่": "Cool Design",
                "แต่งห้อง": "Room Decor",
                "คอม": "Desk Setup",
                "ไอที": "Gadgets",
                "กระเป๋า": "Bag / Case",
                "หูฟัง": "Headphones",
                "นาฬิกา": "Watch / Clock",
                "ของขวัญ": "Gift Idea",
                "ของดีบอกต่อ": "Recommended Items",
                "กำลังอัปเดต": "Updating soon",
                "ยังไม่มีสินค้า": "No item available"
            };

            // ตรวจหาคีย์เวิร์ดแมตช์ในประโยคที่กรอกมา
            for (let key in dictionary) {
                if (lowerText.includes(key)) {
                    translations.push(dictionary[key]);
                }
            }

            // ถ้ามีคีย์เวิร์ดตรงกันให้แปลงเป็นประโยคยาว ถ้าไม่มีให้ใช้คำแปลกลางของระบบช้อปปิ้ง
            if (translations.length > 0) {
                return translations.join(" & ");
            } else {
                return "HOKHOO Selected Quality Item"; 
            }
        }

        /* JAVASCRIPT FOR DESKTOP */
        function renderProducts(dataToRender) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = ""; 

            if(dataToRender.length === 0) {
                grid.innerHTML = `
                <div style='text-align:center; width:100%; color:#777; padding: 40px 0;'>
                    <p style='font-size:1.1rem;'>❌ ไม่พบพิกัดที่คุณค้นหา ลองใช้คำอื่นดูน้า</p>
                    <p class='en-subtext'>No items match your search. Try another keyword.</p>
                </div>`;
                return;
            }

            dataToRender.forEach(p => {
                const isDisabled = p.link.includes("javascript:void(0)") ? "disabled" : "";
                const englishTitle = p.name_en ? `<span class="en-subtext">${p.name_en}</span>` : `<span class="en-subtext">HOKHOO Selected Item</span>`;
                const card = `
                <div class="product-card">
                    <a href="${p.link}" class="product-link" ${isDisabled ? "" : 'target="_blank"'}>
                        <div class="badge-id">${p.id}</div> 
                        <img src="${p.image}" alt="${p.name}" class="product-image" loading="lazy">
                    </a>
                    <div class="product-info">
                        <div class="product-tags">${p.tags}</div> 
                        <h3 class="product-title">${p.name}${englishTitle}</h3>
                        <a href="${p.link}" ${isDisabled ? "" : 'target="_blank"'} class="view-btn ${isDisabled}">
                            📍 ดูพิกัดสินค้า
                            <span class="en-subtext">View Product Link</span>
                        </a>
                    </div>
                </div>`;
                grid.innerHTML += card;
            });
        }

        /* ระบบค้นหาอัจฉริยะ (Super Search) ครอบคลุมทุกมิติ */
        function filterProductsAll() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = products.filter(p => 
                p.id.toLowerCase().includes(query) || 
                p.tags.toLowerCase().includes(query) ||
                p.name.toLowerCase().includes(query) ||
                (p.name_en && p.name_en.toLowerCase().includes(query))
            );
            renderProducts(filtered);
        }

        function openAdmin() {
            const password = prompt("กรุณาใส่รหัสผ่านแอดมิน / Enter Password:");
            if (password === "vapanika3541") {
                document.getElementById('adminModal').style.display = "flex";
                renderAdminList();

        function closeAdmin() {

        function renderAdminList() {
            const list = document.getElementById('adminItemList');
            list.innerHTML = "";
            products.forEach((p, index) => {
                list.innerHTML += `
                <div class="admin-item">
                    <span><b>${p.id}</b> - ${p.name.substring(0, 20)}...</span>
                    <div class="admin-actions">
                        <button class="btn-edit" onclick="editProduct(${index})">แก้ไข (Edit)</button>

        function editProduct(index) {
            const p = products[index];
            document.getElementById('edit_index').value = index;
            document.getElementById('a_id').value = p.id;
            document.getElementById('a_name').value = p.name;
            document.getElementById('a_image').value = p.image;
            document.getElementById('a_link').value = p.link;
            document.getElementById('a_tags').value = p.tags;
            
            document.getElementById('submitBtn').innerText = "💾 บันทึกการแก้ไขพิกัด (Save Changes)";
            document.getElementById('submitBtn').style.backgroundColor = "#4dabf7";
            document.getElementById('submitBtn').style.color = "white";
            document.getElementById('cancelEditBtn').style.display = "block";
        }

        function cancelEdit() {
            document.getElementById('addProductForm').reset();
            document.getElementById('edit_index').value = "-1";
            document.getElementById('submitBtn').innerText = "+ เพิ่มพิกัดใหม่ (Add New Item)";
            document.getElementById('submitBtn').style.backgroundColor = "white";
            document.getElementById('submitBtn').style.color = "black";
            document.getElementById('cancelEditBtn').style.display = "none";
        }

        document.getElementById('addProductForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editIndex = parseInt(document.getElementById('edit_index').value);
            const thaiName = document.getElementById('a_name').value;
            
            // เรียกใช้ระบบแปลภาษาอัตโนมัติฝั่งหลังบ้าน
            const autoTranslatedEN = translateTextAutomated(thaiName);

            const newData = {
                id: document.getElementById('a_id').value.toUpperCase(),
                name: thaiName,
                name_en: autoTranslatedEN, 
                image: document.getElementById('a_image').value,
                link: document.getElementById('a_link').value,
                tags: document.getElementById('a_tags').value
            };

            if (editIndex > -1) {
                products[editIndex] = newData;
                cancelEdit();
            } else {
                products.unshift(newData);
                this.reset();
            }
            saveData();
        });

        function deleteProduct(index) {
            if(confirm("คุณแน่ใจหรือไม่ว่าจะลบพิกัดสินค้านี้? / Delete this item?")) {
                products.splice(index, 1);
                saveData();
                cancelEdit(); 
            }
        }

        /* ฟังก์ชันส่งออก/ดาวน์โหลดไฟล์ HTML ล่าสุด */
        function downloadHTMLFile() {
            let docElement = document.documentElement.cloneNode(true);
            
            // ปิดและล้างการค้างเติ่งของกล่องโมดอลก่อนส่งไฟล์ออก
            const dModal = docElement.querySelector("#adminModal");
            if(dModal) dModal.removeAttribute("style");

            let currentContent = "<!DOCTYPE html>\n" + docElement.outerHTML;
            
            // ฝังข้อมูลอาร์เรย์สินค้าปัจจุบันกลับเข้าไปแทนที่ข้อมูลตั้งต้นในสคริปต์
            const regex = /const initialData = \[\s*[\s\S]*?\s*\];/;
            const updatedInitialDataStr = `const initialData = ${JSON.stringify(products, null, 12)};`;
            currentContent = currentContent.replace(regex, updatedInitialDataStr);
            
            const blob = new Blob([currentContent], { type: "text/html;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "index.html"; 
            link.style.display = "none";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            alert("ดาวน์โหลดไฟล์สำเร็จ! นำไฟล์ไปอัปโหลดทับบน GitHub Pages ได้เลยทันทีครับ");
        }
